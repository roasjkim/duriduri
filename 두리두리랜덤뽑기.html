<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>두리두리 랜덤뽑기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f3ff;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem 4rem;
    }
    h1 { font-size: 20px; font-weight: 500; color: #3C3489; margin-bottom: 1.5rem; letter-spacing: -0.3px; }
    .wrap { max-width: 400px; width: 100%; text-align: center; }
    .machine {
      background: #fff; border: 1px solid #d4d0f5; border-radius: 20px;
      padding: 2rem 1.5rem 1.5rem; margin-bottom: 1.5rem;
      box-shadow: 0 4px 24px rgba(83,74,183,0.08);
    }
    .ball-display {
      width: 140px; height: 140px; border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      background: #EEEDFE; color: #3C3489; border: 2px solid #AFA9EC;
      transition: background 0.3s, border-color 0.3s;
    }
    .ball-display.rolling { background: #FFF3DB; color: #633806; border-color: #FAC775; }
    .ball-display.landed  { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
    .num-text { font-size: 52px; font-weight: 600; line-height: 1; }
    .question { font-size: 40px; color: #AFA9EC; }
    .result-msg { font-size: 15px; color: #5F5E5A; min-height: 22px; margin-bottom: 6px; }
    .options-row {
      display: flex; gap: 16px; justify-content: center;
      font-size: 13px; color: #888780; align-items: center; margin-bottom: 1.2rem;
    }
    .options-row label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .btn-draw {
      display: block; width: 100%; padding: 14px;
      font-size: 17px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      background: #534AB7; color: #EEEDFE; margin-bottom: 10px;
      -webkit-appearance: none; appearance: none;
      touch-action: manipulation;
    }
    .btn-draw:active { opacity: 0.8; }
    .btn-draw:disabled { opacity: 0.4; }
    .btn-reset {
      display: block; width: 100%; padding: 10px; font-size: 14px;
      border: 1px solid #D3D1C7; border-radius: 12px;
      cursor: pointer; background: transparent; color: #888780;
      -webkit-appearance: none; appearance: none;
      touch-action: manipulation;
    }
    .btn-reset:active { background: #f5f3ff; }
    .history-section { margin-top: 1.5rem; }
    .history-title { font-size: 13px; color: #888780; margin-bottom: 10px; text-align: left; }
    .history-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 4px 12px; border-radius: 999px;
      font-size: 13px; font-weight: 500;
      background: #EEEDFE; color: #3C3489; border: 1px solid #AFA9EC;
    }
    .count-bar { font-size: 13px; color: #888780; margin-top: 10px; text-align: right; }
    #fireworks {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 999;
    }
    .footer {
      position: fixed; bottom: 16px; left: 0; width: 100%;
      text-align: center; font-size: 13px; color: #B4B2A9;
    }
  </style>
</head>
<body>

  <canvas id="fireworks"></canvas>

  <div class="wrap">
    <h1>🎰 두리두리 랜덤뽑기</h1>
    <div class="machine">
      <div class="ball-display" id="ball">
        <span class="question" id="ballText">?</span>
      </div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="options-row">
        <label><input type="checkbox" id="noDup" checked> 중복 제외</label>
        <span>범위: <strong>1 ~ 100</strong></span>
      </div>
      <button class="btn-draw" id="drawBtn">뽑기!</button>
      <button class="btn-reset" id="resetBtn">초기화</button>
    </div>
    <div class="history-section" id="historySection" style="display:none;">
      <div class="history-title">뽑은 번호</div>
      <div class="history-pills" id="pills"></div>
      <div class="count-bar" id="countBar"></div>
    </div>
  </div>

  <p class="footer">Made by SujinKim</p>

  <script>
    var drawn = [];
    var rolling = false;
    var MIN = 1, MAX = 100;
    var audioCtx = null;

    var fw = document.getElementById('fireworks');
    var fctx = fw.getContext('2d');
    var particles = [];
    var fwRaf = null;

    function resizeFw() { fw.width = window.innerWidth; fw.height = window.innerHeight; }
    window.addEventListener('resize', resizeFw);
    resizeFw();

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTick() {
      try {
        var c = getAudio();
        var o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'square';
        o.frequency.value = 600 + Math.random() * 400;
        g.gain.setValueAtTime(0.1, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
        o.start(c.currentTime); o.stop(c.currentTime + 0.07);
      } catch(e) {}
    }

    function playWin() {
      try {
        var c = getAudio();
        var melody = [[659,0],[784,0.1],[880,0.2],[1047,0.3],[880,0.38],[1047,0.46],[1319,0.54],[1047,0.66],[880,0.74],[1047,0.82],[1319,0.9],[1568,1.0],[1319,1.12],[1568,1.22],[1760,1.32]];
        melody.forEach(function(n) {
          var o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination);
          o.type = 'square'; o.frequency.value = n[0];
          var t = c.currentTime + n[1];
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.18, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
          o.start(t); o.stop(t + 0.19);
        });
        [0, 0.3, 0.7, 1.1].forEach(function(w) {
          var sr = c.sampleRate;
          var buf = c.createBuffer(1, sr * 0.15, sr);
          var d = buf.getChannelData(0);
          for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
          var src = c.createBufferSource(), f = c.createBiquadFilter(), g = c.createGain();
          f.type = 'bandpass'; f.frequency.value = 1200 + Math.random()*800;
          src.buffer = buf; src.connect(f); f.connect(g); g.connect(c.destination);
          var t = c.currentTime + w;
          g.gain.setValueAtTime(0.4, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          src.start(t);
        });
      } catch(e) {}
    }

    var COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f1c','#ff4fcf','#00f5d4'];

    function burst(x, y) {
      for (var i = 0; i < 90; i++) {
        var a = Math.random() * Math.PI * 2, spd = 3 + Math.random() * 7;
        particles.push({ x:x, y:y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
          color:COLORS[Math.floor(Math.random()*COLORS.length)],
          alpha:1, size:3+Math.random()*4, gravity:0.18+Math.random()*0.1, decay:0.013+Math.random()*0.008 });
      }
    }

    function launchFireworks() {
      [[0.2,0.3],[0.5,0.2],[0.8,0.3],[0.15,0.6],[0.85,0.6],[0.5,0.45]].forEach(function(s) {
        burst(fw.width * s[0], fw.height * s[1]);
      });
      if (fwRaf) cancelAnimationFrame(fwRaf);
      fwRaf = null;
      animateFw();
    }

    function animateFw() {
      fwRaf = requestAnimationFrame(animateFw);
      fctx.clearRect(0, 0, fw.width, fw.height);
      particles.forEach(function(p) {
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.97; p.alpha-=p.decay;
        fctx.save(); fctx.globalAlpha=Math.max(p.alpha,0); fctx.fillStyle=p.color;
        fctx.beginPath(); fctx.arc(p.x,p.y,p.size,0,Math.PI*2); fctx.fill(); fctx.restore();
      });
      particles = particles.filter(function(p){ return p.alpha > 0; });
      if (particles.length === 0) { cancelAnimationFrame(fwRaf); fwRaf = null; fctx.clearRect(0,0,fw.width,fw.height); }
    }

    function getAvailable() {
      var all = [];
      for (var i = MIN; i <= MAX; i++) all.push(i);
      if (!document.getElementById('noDup').checked) return all;
      return all.filter(function(n){ return drawn.indexOf(n) === -1; });
    }

    function doDraw() {
      if (rolling) return;
      var pool = getAvailable();
      if (pool.length === 0) { document.getElementById('resultMsg').textContent = '모든 번호를 다 뽑았어요!'; return; }
      rolling = true;
      var btn = document.getElementById('drawBtn');
      btn.disabled = true;
      var ball = document.getElementById('ball');
      var ballText = document.getElementById('ballText');
      ball.className = 'ball-display rolling';
      ballText.className = 'num-text';
      document.getElementById('resultMsg').textContent = '';
      var count = 0, total = 20, delay = 60;
      function tick() {
        ballText.textContent = pool[Math.floor(Math.random()*pool.length)];
        count++;
        if (count >= total) {
          var final = pool[Math.floor(Math.random()*pool.length)];
          ballText.textContent = final;
          ball.className = 'ball-display landed';
          drawn.push(final);
          rolling = false;
          btn.disabled = false;
          document.getElementById('resultMsg').textContent = '🎉 ' + final + '번 당첨!';
          playWin();
          launchFireworks();
          renderHistory();
        } else {
          playTick();
          delay = Math.min(delay + 8, 180);
          setTimeout(tick, delay);
        }
      }
      setTimeout(tick, delay);
    }

    function renderHistory() {
      var sec = document.getElementById('historySection');
      if (drawn.length === 0) { sec.style.display = 'none'; return; }
      sec.style.display = 'block';
      var pills = document.getElementById('pills');
      pills.innerHTML = '';
      drawn.slice().reverse().forEach(function(n) {
        var p = document.createElement('span');
        p.className = 'pill'; p.textContent = n; pills.appendChild(p);
      });
      var noDup = document.getElementById('noDup').checked;
      document.getElementById('countBar').textContent = noDup
        ? '총 '+drawn.length+'번 뽑음 / 남은 번호 '+(MAX-MIN+1-drawn.length)+'개'
        : '총 '+drawn.length+'번 뽑음';
    }

    function doReset() {
      drawn = []; rolling = false;
      var ball = document.getElementById('ball');
      var ballText = document.getElementById('ballText');
      ball.className = 'ball-display';
      ballText.className = 'question';
      ballText.textContent = '?';
      document.getElementById('resultMsg').textContent = '';
      document.getElementById('historySection').style.display = 'none';
      particles = [];
      if (fwRaf) { cancelAnimationFrame(fwRaf); fwRaf = null; }
      fctx.clearRect(0, 0, fw.width, fw.height);
    }

    document.getElementById('drawBtn').addEventListener('touchend', function(e) {
      e.preventDefault();
      doDraw();
    });
    document.getElementById('drawBtn').addEventListener('click', doDraw);

    document.getElementById('resetBtn').addEventListener('touchend', function(e) {
      e.preventDefault();
      doReset();
    });
    document.getElementById('resetBtn').addEventListener('click', doReset);
  </script>
</body>
</html>
